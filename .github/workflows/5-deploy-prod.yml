name: "5 — Deploy: Production"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DEPLOY to confirm production deployment'
        required: true
        default: ''

env:
  AI_URL: ${{ vars.AI_SERVICE_URL || 'http://localhost:8000' }}

jobs:
  # ── AI Risk Gate ─────────────────────────────────────────────────────────────
  ai-risk-gate:
    name: AI Risk Gate
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ Confirmation input must be exactly 'DEPLOY'"
            echo "   Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✓ Deployment confirmed by ${{ github.actor }}"

      - name: Checkout
        uses: actions/checkout@v4

      # ── Ask AI for risk assessment ───────────────────────────────────────────
      - name: AI Risk Assessment
        id: ai_gate
        env:
          RUN_ID: ${{ github.run_id }}
          SHA:    ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          ACTOR:  ${{ github.actor }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          # High-risk payload: known security issues present (intentional demo)
          payload = json.dumps({
              "pipeline_run_id":     os.environ["RUN_ID"],
              "commit_sha":          os.environ["SHA"],
              "branch":              os.environ["BRANCH"],
              "developer":           os.environ["ACTOR"],
              "changed_files":       [
                  "src/app.js", "src/auth.js", "src/db.js",
                  "src/utils.js", "src/server.js",
                  "tests/app.test.js", "tests/auth.test.js", "tests/utils.test.js",
                  "package.json", "package-lock.json", ".github/workflows/5-deploy-prod.yml",
                  "README.md",
              ],
              "files_changed_count": 12,
              "critical_cves":       2,
              "high_cves":           5,
              "test_pass_rate":      0.75,
              "target_environment":  "production",
          }).encode()

          try:
              req = urllib.request.Request(
                  os.environ.get("AI_URL", "http://localhost:8000") + "/webhook/pipeline/started",
                  data=payload, headers={"Content-Type": "application/json"},
              )
              res = json.loads(urllib.request.urlopen(req, timeout=15).read())

              rec       = res.get("recommendation", "proceed")
              risk      = res.get("risk_score",     0.0)
              reduction = res.get("test_reduction_pct", 0)

              print(f"AI Risk Assessment:")
              print(f"  recommendation   = {rec}")
              print(f"  risk_score       = {risk}")
              print(f"  test_reduction   = {reduction}%")

              out = os.environ.get("GITHUB_OUTPUT", "")
              if out:
                  with open(out, "a") as f:
                      f.write(f"recommendation={rec}\n")
                      f.write(f"risk_score={risk}\n")

              if rec == "block":
                  print("")
                  print("🚫 AI recommends BLOCKING production deployment")
                  print(f"   Risk score {risk:.3f} exceeds threshold — remediate security findings first")
                  sys.exit(1)
              elif rec == "caution":
                  print("")
                  print("⚠️  AI recommends CAUTION — proceeding with extra care")
              else:
                  print("")
                  print("✓ AI approves deployment")

          except urllib.error.URLError as e:
              print(f"AI service not reachable: {e.reason}")
              print("Proceeding without AI gate (service unavailable)")
          PYEOF

  # ── Production Deployment ────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ai-risk-gate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: build-${{ github.sha }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-deployment backup
        run: |
          echo "=== Pre-deployment Backup ==="
          echo "Creating backup snapshot of current production state..."
          sleep 2
          echo "  ✓ database snapshot: prod-backup-$(date +%Y%m%d-%H%M%S)"
          echo "  ✓ config backup stored"
          echo "  ✓ rollback point registered"

      - name: Deploy to Production
        id: deploy
        run: |
          echo "=== Production Deployment ==="
          echo "Commit  : ${{ github.sha }}"
          echo "Actor   : ${{ github.actor }}"
          echo "Run ID  : ${{ github.run_id }}"
          echo "Time    : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "Extracting artifact..."
          if [ -f app-build.tar.gz ]; then
            tar -xzf app-build.tar.gz
            echo "  ✓ artifact unpacked"
          else
            echo "  ⚠ artifact not found — deploying from source"
          fi
          echo ""
          echo "Rolling out to production fleet..."
          sleep 5
          echo "  ✓ canary instance updated (5%)"
          sleep 2
          echo "  ✓ rolling update 50% complete"
          sleep 2
          echo "  ✓ rolling update 100% complete"
          echo ""
          echo "  ✓ health checks passed"
          echo "  ✓ traffic shifted to new instances"
          echo ""
          echo "deploy_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Production deployment complete."

      - name: Post-deployment verification
        run: |
          echo "=== Post-Deployment Verification ==="
          echo ""
          echo "  GET /health     → 200 ✓"
          echo "  GET /users/1    → 200 ✓"
          echo ""
          echo "  ⚠ Known issues (NOT blocking — tracked separately):"
          echo "    - SQL injection in /users/search (CVE tracked, patch scheduled)"
          echo "    - Hardcoded JWT secret (rotation scheduled)"
          echo "    - eval() in utils.js (refactor in progress)"
          echo ""
          echo "Verification complete."

      # ── Notify AI: production deploy finished ────────────────────────────────
      - name: Notify AI — Pipeline Completed
        if: always()
        continue-on-error: true
        env:
          RUN_ID: ${{ github.run_id }}
          SHA:    ${{ github.sha }}
          STATUS: ${{ job.status }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error
          passed = os.environ.get("STATUS") == "success"
          payload = json.dumps({
              "pipeline_run_id":        os.environ["RUN_ID"],
              "commit_sha":             os.environ["SHA"],
              "passed":                 passed,
              "build_duration_seconds": 60.0,
              "test_count":             0,
              "failure_rate":           0.0 if passed else 1.0,
              "files_changed_count":    12,
              "target_environment":     "production",
          }).encode()
          try:
              req = urllib.request.Request(
                  os.environ.get("AI_URL", "http://localhost:8000") + "/webhook/pipeline/completed",
                  data=payload, headers={"Content-Type": "application/json"},
              )
              res = json.loads(urllib.request.urlopen(req, timeout=10).read())
              print(f"AI health score: {res.get('overall_health_score')}")
              print(f"    anomaly={res.get('is_anomaly')}  incident={res.get('will_incident_occur')}")
              print(f"    policy_tuned={res.get('policy_tuned')}")
          except urllib.error.URLError as e:
              print(f"AI service not reachable: {e.reason}")
          PYEOF
